name: Build Arnis for Windows

on:
 workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: arnis.exe
            asset_name: arnis-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: stable
        targets: ${{ matrix.target }}

    - name: Install dependencies
      run: cargo fetch

    - name: Build
      run: cargo build --release --target ${{ matrix.target }}

    - name: Rename binary for release
      run: mv target/${{ matrix.target }}/release/${{ matrix.binary_name }} target/release/${{ matrix.asset_name }}

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.os }}-${{ matrix.target }}-build
        path: target/release/${{ matrix.asset_name }}${{ matrix.os != 'windows-latest' && '.tar.gz' || '' }}
